<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Testing Export</title>
</head>
<body>
  <h2>Design Testing Export</h2>

  <div class="section" id="selection-section">
    <h3>Selected Node</h3>
    <div id="selection-info" class="no-selection">
      Select a Frame or Component in Pixso
    </div>
  </div>

  <button class="btn btn-primary" id="export-btn" disabled>
    Export for Playwright
  </button>

  <button class="btn btn-secondary" id="history-btn" style="display:none">
    Open History
  </button>

  <div class="dialog-overlay" id="export-dialog">
    <div class="dialog">
      <h2>Export Artifact</h2>
      <div class="form-group">
        <label>Design ID</label>
        <input type="text" id="field-design-id" placeholder="e.g. product-card">
      </div>
      <div class="form-group">
        <label>Version Comment</label>
        <input type="text" id="field-comment" placeholder="e.g. Updated spacing">
      </div>
      <div class="form-group">
        <label>Scale</label>
        <select id="field-scale">
          <option value="1">1x</option>
          <option value="2" selected>2x</option>
          <option value="3">3x</option>
        </select>
      </div>
      <div class="form-group">
        <label>Export format</label>
        <select id="field-format">
          <option value="PNG" selected>PNG (image)</option>
          <option value="PNG+SVG">PNG + SVG</option>
        </select>
      </div>
      <div class="form-group" id="svg-options-group" style="display:none">
        <label style="display:flex;align-items:center;gap:6px;font-size:11px">
          <input type="checkbox" id="field-svg-outline-text" checked>
          Outline text (text as &lt;text&gt;)
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:11px">
          <input type="checkbox" id="field-svg-id-attribute" checked>
          Include layer IDs
        </label>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:6px">
          <input type="checkbox" id="field-design-properties" checked>
          Include design properties (design.json)
        </label>
      </div>
      <div class="form-group">
        <label>Tags (comma separated)</label>
        <input type="text" id="field-tags" placeholder="e.g. catalog, card">
      </div>
      <div class="form-group">
        <label>Related Test (path)</label>
        <input type="text" id="field-test-id" placeholder="e.g. catalog/product-card.spec.ts">
      </div>
      <div class="dialog-buttons">
        <button class="btn btn-primary" id="confirm-export-btn" style="flex:1">Export</button>
        <button class="btn btn-secondary" id="cancel-export-btn" style="flex:1">Cancel</button>
      </div>
    </div>
  </div>

  <div class="dialog-overlay" id="history-dialog">
    <div class="dialog">
      <h2>Version History</h2>
      <div id="history-content" class="version-list">
        <div class="no-selection">Select a node and export first</div>
      </div>
      <div class="dialog-buttons">
        <button class="btn btn-secondary" id="close-history-btn" style="flex:1">Close</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</body>
</html>
